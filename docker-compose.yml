services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: beshno
      POSTGRES_PASSWORD: beshno
      POSTGRES_DB: beshno
    volumes:
      - beshno_db:/var/lib/postgresql/data
    ports:
      # Host 5433 -> container 5432 (avoids clashing with a local Postgres on 5432).
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beshno"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://beshno:beshno@db:5432/beshno
      # Leave the keys empty to run on mock providers.
      ANTHROPIC_API_KEY: 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
      ANTHROPIC_MODEL: claude-sonnet-4-6
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}
      SEARCH_PROVIDER: ${SEARCH_PROVIDER:-auto}
      TAVILY_API_KEY: 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
      TTS_PROVIDER: ${TTS_PROVIDER:-auto}
      # To use Google TTS in Docker, mount the JSON below and point this at it.
      GOOGLE_APPLICATION_CREDENTIALS: AIzaSyDvInlmV7yrdWD3wvImV_JxcoEGE4pGWSk
      MAX_REVISIONS: ${MAX_REVISIONS:-2}
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
      STORAGE_DIR: /data
    volumes:
      - beshno_audio:/data
      # - ./secrets/gcp.json:/secrets/gcp.json:ro   # then set GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcp.json
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  beshno_db:
  beshno_audio:
