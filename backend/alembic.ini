# Alembic configuration for Beshno.
#
# The database URL is NOT set here — env.py reads it from the application
# settings (DATABASE_URL / .env) so there is a single source of truth.

[alembic]
script_location = alembic
prepend_sys_path = .
# Use OS-native path separators.
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
